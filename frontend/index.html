<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo-gurubantu.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GuruBantu AI — RPP &amp; Administrasi Guru Otomatis</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2563EB" />
    <!-- Google Fonts: Plus Jakarta Sans + Inter for Premium UI -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!--
      Anti-FOUC (Flash Of Unstyled Content) Script
      Reads saved theme from localStorage BEFORE React hydrates,
      then immediately applies the correct class to <html>.
      This prevents the dark→light flicker on page load.
    -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('gurubantu_theme');
          var theme = (saved === 'light' || saved === 'dark') ? saved : 'dark';
          if (theme === 'light') {
            document.documentElement.classList.add('light');
            document.documentElement.classList.remove('dark');
          } else {
            document.documentElement.classList.add('dark');
            document.documentElement.classList.remove('light');
          }
        } catch (e) {
          // localStorage not available, default to dark
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('[PWA] Service Worker registered:', reg.scope))
            .catch((err) => console.error('[PWA] Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
